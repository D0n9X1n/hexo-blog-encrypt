<div class="hbe hbe-container" id="hexo-blog-encrypt" data-wpm="{{hbeWrongPassMessage}}" data-whm="{{hbeWrongHashMessage}}">
  <script id="hbeData" type="hbeData" data-hmacdigest="{{hbeHmacDigest}}" data-keysalt="{{hbeKeySalt}}" data-ivsalt="{{hbeIvSalt}}">
    {{hbeEncryptedData}}
  </script>
  <div class="hbe hbe-content">
    <form id="hbeForm" class="hbe hbe-form" onsubmit="return false">
      <div class="hbe hbe-input hbe-input-up">
      <input class="hbe hbe-input-field hbe-input-field-up" type="password" id="hbePass">
      <label class="hbe hbe-input-label hbe-input-label-up" for="hbePass">
        <span class="hbe hbe-input-label-content hbe-input-label-content-up">{{hbeMessage}}</span>
      </label>
    </div>
      <button class="hbe hbe-button" type="submit">Decrypt</button>
      <div class="hbe hbe-error" role="alert" aria-live="polite"></div>
    </form>
  </div>
</div>
