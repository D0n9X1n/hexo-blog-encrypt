<div class="hbe hbe-container" id="hexo-blog-encrypt"
     data-hbe-format="{{hbeFormat}}"
     data-wpm="{{hbeWrongPassMessage}}"
     data-whm="{{hbeWrongHashMessage}}"
     data-salt="{{hbeSalt}}"
     data-nonce="{{hbeNonce}}"
     data-kdf-iterations="{{hbeKdfIterations}}"
     data-auto-save="{{hbeAutoSave}}">
  <script id="hbeData" type="hbeData">
    {{hbeEncryptedData}}
  </script>
  <div class="hbe hbe-content">
    <form id="hbeForm" class="hbe hbe-form" onsubmit="return false">
      <div class="hbe hbe-input hbe-input-shrink">
      <input class="hbe hbe-input-field hbe-input-field-shrink" type="password" id="hbePass">
      <label class="hbe hbe-input-label hbe-input-label-shrink" for="hbePass">
        <span class="hbe hbe-input-label-content hbe-input-label-content-shrink">{{hbeMessage}}</span>
      </label>
    </div>
      <button class="hbe hbe-button{{hbeButtonClass}}" type="submit">{{hbeButtonText}}</button>
      <div class="hbe hbe-error" role="alert" aria-live="polite"></div>
    </form>
  </div>
</div>
