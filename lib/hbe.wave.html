<div class="hbe hbe-container" id="hexo-blog-encrypt"
     data-hbe-format="{{hbeFormat}}"
     data-wpm="{{hbeWrongPassMessage}}"
     data-whm="{{hbeWrongHashMessage}}"
     data-salt="{{hbeSalt}}"
     data-nonce="{{hbeNonce}}"
     data-kdf-iterations="{{hbeKdfIterations}}"
     data-auto-save="{{hbeAutoSave}}">
  <script id="hbeData" type="hbeData">
    {{hbeEncryptedData}}
  </script>
  <div class="hbe hbe-content">
    <form id="hbeForm" class="hbe hbe-form" onsubmit="return false">
      <div class="hbe hbe-input hbe-input-wave">
      <input class="hbe hbe-input-field hbe-input-field-wave" type="password" id="hbePass">
      <label class="hbe hbe-input-label hbe-input-label-wave" for="hbePass">
        <span class="hbe hbe-input-label-content hbe-input-label-content-wave">{{hbeMessage}}</span>
      </label>
      <svg class="hbe hbe-graphic hbe-graphic-wave" width="300%" height="100%" viewBox="0 0 1200 60" preserveAspectRatio="none">
        <path d="M0,56.5c0,0,298.666,0,399.333,0C448.336,56.5,513.994,46,597,46c77.327,0,135,10.5,200.999,10.5c95.996,0,402.001,0,402.001,0"></path>
      </svg>
    </div>
      <button class="hbe hbe-button{{hbeButtonClass}}" type="submit">{{hbeButtonText}}</button>
      <div class="hbe hbe-error" role="alert" aria-live="polite"></div>
    </form>
  </div>
</div>
