# Publishes hexo-blog-encrypt to npm when a `v*` tag is pushed.
#
# Pre-flight (manual, before tagging):
#   1. Update CHANGELOG.md with the release date.
#   2. Bump `version` in `package.json` to match the tag (e.g. `v4.0.0` → `4.0.0`).
#   3. Revert `demo/package.json`'s `hexo-blog-encrypt` from `"file:.."`
#      back to `"^X.Y.Z"` so the deployed demo references the published
#      package, not a local file: path.
#      We deliberately do NOT use `prepublishOnly` to mutate this file —
#      that would leave a dirty working tree and risk corrupted commits.
#   4. Commit, push, then create+push the `v*` tag.
#
# Auth: Trusted Publishing via OIDC.
#   Configure the trusted publisher on npmjs.com:
#     https://www.npmjs.com/package/hexo-blog-encrypt/access
#       → Trusted Publishers → GitHub Actions
#       → org D0n9X1n, repo hexo-blog-encrypt, workflow release.yml
#   No long-lived NPM_TOKEN secret is required. The `id-token: write`
#   permission below + npm CLI >= 11.5.1 + `--provenance` is enough.

name: Release to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # OIDC — required for trusted publishing AND --provenance

# Never cancel a half-completed publish — let any in-flight job finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        # Node 20 ships with npm 10.x; trusted publishing needs >= 11.5.1.
        # Pinning to ^11 keeps us inside the major while picking up patches.
        run: npm install -g npm@^11

      - name: Cache npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node20-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Verify CHANGELOG has dated entry for this version
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if ! grep -qE "^## \[${TAG_VERSION}\] — [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a dated entry for ${TAG_VERSION} (still 'Unreleased'?)"
            exit 1
          fi

      - name: Verify demo references published package, not file:..
        run: |
          if grep -q '"hexo-blog-encrypt": *"file:' demo/package.json; then
            echo "::error::demo/package.json still references 'file:..' — revert to a semver range before tagging"
            exit 1
          fi

      - name: Run full test suite (lint + server + e2e)
        run: npm test

      - name: Verify tarball contents
        run: |
          npm pack --dry-run --json > pack.json
          node build/verify-pack.js pack.json

      - name: Publish to npm (OIDC trusted publisher + provenance)
        # No NODE_AUTH_TOKEN: npm detects the GitHub Actions OIDC issuer
        # via the id-token permission above and exchanges it with the
        # trusted publisher configured for this package on npmjs.com.
        run: npm publish --provenance --access public
